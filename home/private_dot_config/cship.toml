# cship — Claude Code statusline
# Full config reference: https://cship.dev
[cship]
lines = ["$starship_prompt", """
  $cship.model\
  $cship.context_bar\
  $cship.cost\
  $cship.usage_limits\
  $cship.cost.total_duration
  """]

[cship.model]
style = "blue"
format = "([$value]($style) )"

[cship.context_bar]
width = 10
style = "bold green"
format = "([$value]($style) )"
warn_threshold = 40.0
warn_style = "bold yellow"
critical_threshold = 70.0
critical_style = "bold red"

[cship.cost]
style = "green"
format = "([$value]($style) )"
warn_threshold = 10
warn_style = "yellow"
critical_threshold = 15
critical_style = "red"

[cship.usage_limits]
five_hour_format = "5h {pct}% ({reset})"
seven_day_format = "7d {pct}% ({reset})"
separator = " "
warn_threshold = 60.0
warn_style = "bold yellow"
critical_threshold = 80.0
critical_style = "bold red"

[cship.cost.total_duration]
format = "([$value]($style) )"
